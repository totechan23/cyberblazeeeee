<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civic AI | Gov Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero small">
      <div>
        <p class="badge">GOVERNMENT CONTROL CENTER</p>
        <h1>Civic AI Dashboard</h1>
      </div>
      <a href="/" class="btn btn-outline">Citizen Portal</a>
    </header>

    <main class="layout single">
      <section class="card">
        <h2>Municipal Metrics</h2>
        <div class="stats-grid" id="statsGrid"></div>
      </section>

      <section class="card">
        <h2>Incoming Cases</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Citizen</th>
              <th>Location</th>
              <th>Message</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="reportsTable"></tbody>
        </table>
      </section>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
